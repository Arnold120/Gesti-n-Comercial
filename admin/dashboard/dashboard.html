<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

<div class="dashboard">

    <h1>Dashboard General</h1>

    <div id="stats" class="stats"></div>

    <div class="section">
        <h2>Últimos Movimientos</h2>
        <table>
            <thead>
                <tr>
                    <th>Tipo</th>
                    <th>Detalle</th>
                    <th>Fecha</th>
                </tr>
            </thead>
            <tbody id="movimientos"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Productos con Bajo Inventario</h2>
        <table>
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Stock</th>
                </tr>
            </thead>
            <tbody id="bajoStock"></tbody>
        </table>
    </div>

</div>

<script src="../../auth.js"></script>
<script src="../../services/storage.js"></script>
<script src="dashboard.js"></script>

</body>
</html>
