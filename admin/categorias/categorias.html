<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Categorías</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="categorias.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Categorías</h1>

    <div class="form-card">

        <input type="hidden" id="idCategoria">

        <div class="form-group">
            <label>Nombre</label>
            <input type="text" id="nombre" placeholder="Nombre categoría">
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <input type="text" id="descripcion" placeholder="Descripción">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="estado">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="guardarCategoria()">Guardar</button>
            <button onclick="actualizarCategoria()">Actualizar</button>
            <button onclick="limpiarFormulario()">Limpiar</button>
        </div>

    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Descripción</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCategorias"></tbody>
        </table>
    </div>

</div>

<script src="../../auth.js"></script>
<script src="../../services/storage.js"></script>
<script src="categorias.js"></script>

</body>
</html>
