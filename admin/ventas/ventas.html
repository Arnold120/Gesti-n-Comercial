<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Ventas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="ventas.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Ventas</h1>

    <div class="form-card">

        <input type="hidden" id="idVenta">

        <div class="form-group">
            <label>Número de venta</label>
            <input type="text" id="numeroVenta">
        </div>

        <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="cliente">
        </div>

        <div class="form-group">
            <label>Código producto</label>
            <input type="text" id="codigo">
        </div>

        <div class="form-group">
            <label>Nombre producto</label>
            <input type="text" id="nombre">
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="categoria">
        </div>

        <div class="form-group">
            <label>Cantidad</label>
            <input type="number" id="cantidad">
        </div>

        <div class="form-group">
            <label>Precio unitario</label>
            <input type="number" id="precioUnitario">
        </div>

        <div class="form-group">
            <label>Descuento</label>
            <input type="number" id="descuento" value="0">
        </div>

        <div class="form-group">
            <label>Impuesto</label>
            <input type="number" id="impuesto" value="0">
        </div>

        <div class="form-group">
            <label>Método de pago</label>
            <select id="metodoPago">
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Transferencia">Transferencia</option>
            </select>
        </div>

        <div class="form-group">
            <label>Usuario responsable</label>
            <input type="text" id="usuario">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="estado">
                <option value="Pendiente">Pendiente</option>
                <option value="Pagada">Pagada</option>
                <option value="Anulada">Anulada</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="guardarVenta()">Guardar</button>
            <button onclick="actualizarVenta()">Actualizar</button>
            <button onclick="limpiarFormulario()">Limpiar</button>
        </div>

    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Cliente</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Descuento</th>
                    <th>Impuesto</th>
                    <th>Total</th>
                    <th>Método</th>
                    <th>Usuario</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaVentas"></tbody>
        </table>
    </div>

</div>

<script src="../../auth.js"></script>
<script src="../../services/storage.js"></script>
<script src="ventas.js"></script>

</body>
</html>
