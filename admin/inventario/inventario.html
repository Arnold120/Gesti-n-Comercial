<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Inventario</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="inventario.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Inventario</h1>

    <div class="form-card">

        <input type="hidden" id="idInventario">

        <div class="form-group">
            <label>Código producto</label>
            <input type="text" id="codigo" placeholder="Código producto">
        </div>

        <div class="form-group">
            <label>Nombre producto</label>
            <input type="text" id="nombre" placeholder="Nombre producto">
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="categoria" placeholder="Categoría">
        </div>

        <div class="form-group">
            <label>Stock actual</label>
            <input type="number" id="stockActual" placeholder="Stock actual">
        </div>

        <div class="form-group">
            <label>Stock mínimo</label>
            <input type="number" id="stockMinimo" placeholder="Stock mínimo">
        </div>

        <div class="form-group">
            <label>Tipo movimiento</label>
            <select id="tipoMovimiento">
                <option value="Entrada">Entrada</option>
                <option value="Salida">Salida</option>
                <option value="Ajuste">Ajuste</option>
            </select>
        </div>

        <div class="form-group">
            <label>Cantidad</label>
            <input type="number" id="cantidad" placeholder="Cantidad">
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <input type="text" id="descripcion" placeholder="Descripción">
        </div>

        <div class="form-group">
            <label>Usuario responsable</label>
            <input type="text" id="usuario" placeholder="Usuario">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="estado">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="guardarInventario()">Guardar</button>
            <button onclick="actualizarInventario()">Actualizar</button>
            <button onclick="limpiarFormulario()">Limpiar</button>
        </div>

    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Producto</th>
                    <th>Categoría</th>
                    <th>Movimiento</th>
                    <th>Cantidad</th>
                    <th>Stock resultante</th>
                    <th>Usuario</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaInventario"></tbody>
        </table>
    </div>

</div>

<script src="../../auth.js"></script>
<script src="../../services/storage.js"></script>
<script src="inventario.js"></script>

</body>
</html>
