<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Proveedores</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="proveedores.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Proveedores</h1>

    <div class="form-card">

        <input type="hidden" id="idProveedor">

        <div class="form-group">
            <label>Nombre empresa / proveedor</label>
            <input type="text" id="nombre" placeholder="Nombre proveedor">
        </div>

        <div class="form-group">
            <label>Contacto</label>
            <input type="text" id="contacto" placeholder="Contacto">
        </div>

        <div class="form-group">
            <label>Teléfono</label>
            <input type="text" id="telefono" placeholder="Teléfono">
        </div>

        <div class="form-group">
            <label>Correo electrónico</label>
            <input type="email" id="correo" placeholder="Correo">
        </div>

        <div class="form-group">
            <label>Dirección</label>
            <input type="text" id="direccion" placeholder="Dirección">
        </div>

        <div class="form-group">
            <label>Tipo de proveedor</label>
            <input type="text" id="tipo" placeholder="Tipo">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="estado">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="guardarProveedor()">Guardar</button>
            <button onclick="actualizarProveedor()">Actualizar</button>
            <button onclick="limpiarFormulario()">Limpiar</button>
        </div>

    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Contacto</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th>Dirección</th>
                    <th>Tipo</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProveedores"></tbody>
        </table>
    </div>

</div>

<script src="../../auth.js"></script>
<script src="../../services/storage.js"></script>
<script src="proveedores.js"></script>

</body>
</html>
