<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Productos</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="productos.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Productos</h1>

    <div class="form-card">

        <input type="hidden" id="idProducto">

        <div class="form-group">
            <label>Código del producto</label>
            <input type="text" id="codigo" placeholder="Código">
        </div>

        <div class="form-group">
            <label>Nombre del producto</label>
            <input type="text" id="nombre" placeholder="Nombre">
        </div>

        <div class="form-group">
            <label>Descripción</label>
            <input type="text" id="descripcion" placeholder="Descripción">
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="categoria" placeholder="Categoría">
        </div>

        <div class="form-group">
            <label>Proveedor</label>
            <input type="text" id="proveedor" placeholder="Proveedor">
        </div>

        <div class="form-group">
            <label>Precio compra</label>
            <input type="number" id="precioCompra" placeholder="Precio compra">
        </div>

        <div class="form-group">
            <label>Precio venta</label>
            <input type="number" id="precioVenta" placeholder="Precio venta">
        </div>

        <div class="form-group">
            <label>Stock actual</label>
            <input type="number" id="stock" placeholder="Stock">
        </div>

        <div class="form-group">
            <label>Stock mínimo</label>
            <input type="number" id="stockMinimo" placeholder="Stock mínimo">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="estado">
                <option value="Activo">Activo</option>
                <option value="Inactivo">Inactivo</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="guardarProducto()">Guardar</button>
            <button onclick="actualizarProducto()">Actualizar</button>
            <button onclick="limpiarFormulario()">Limpiar</button>
        </div>

    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Proveedor</th>
                    <th>Precio compra</th>
                    <th>Precio venta</th>
                    <th>Stock</th>
                    <th>Stock mínimo</th>
                    <th>Estado</th>
                    <th>Fecha</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaProductos"></tbody>
        </table>
    </div>

</div>

<script src="../../auth.js"></script>
<script src="../../services/storage.js"></script>
<script src="productos.js"></script>

</body>
</html>
