<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Compras</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="compras.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Compras</h1>

    <div class="form-card">

        <input type="hidden" id="idCompra">

        <div class="form-group">
            <label>Número de compra</label>
            <input type="text" id="numeroCompra">
        </div>

        <div class="form-group">
            <label>Proveedor</label>
            <input type="text" id="proveedor">
        </div>

        <div class="form-group">
            <label>Código producto</label>
            <input type="text" id="codigo">
        </div>

        <div class="form-group">
            <label>Nombre producto</label>
            <input type="text" id="nombre">
        </div>

        <div class="form-group">
            <label>Categoría</label>
            <input type="text" id="categoria">
        </div>

        <div class="form-group">
            <label>Cantidad</label>
            <input type="number" id="cantidad">
        </div>

        <div class="form-group">
            <label>Precio unitario</label>
            <input type="number" id="precioUnitario">
        </div>

        <div class="form-group">
            <label>Impuesto</label>
            <input type="number" id="impuesto">
        </div>

        <div class="form-group">
            <label>Método de pago</label>
            <select id="metodoPago">
                <option value="Efectivo">Efectivo</option>
                <option value="Tarjeta">Tarjeta</option>
                <option value="Transferencia">Transferencia</option>
            </select>
        </div>

        <div class="form-group">
            <label>Usuario responsable</label>
            <input type="text" id="usuario">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="estado">
                <option value="Pendiente">Pendiente</option>
                <option value="Pagado">Pagado</option>
                <option value="Anulado">Anulado</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="guardarCompra()">Guardar</button>
            <button onclick="actualizarCompra()">Actualizar</button>
            <button onclick="limpiarFormulario()">Limpiar</button>
        </div>

    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Número</th>
                    <th>Proveedor</th>
                    <th>Producto</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Total</th>
                    <th>Método</th>
                    <th>Usuario</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaCompras"></tbody>
        </table>
    </div>

</div>

<script src="../../auth.js"></script>
<script src="../../services/storage.js"></script>
<script src="compras.js"></script>

</body>
</html>
