<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión de Facturas</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="facturas.css">
</head>
<body>

<div class="container">

    <h1>Gestión de Facturas</h1>

    <div class="form-card">

        <input type="hidden" id="idFactura">

        <div class="form-group">
            <label>Número de factura</label>
            <input type="text" id="numeroFactura">
        </div>

        <div class="form-group">
            <label>Número de venta</label>
            <input type="text" id="numeroVenta">
        </div>

        <div class="form-group">
            <label>Cliente</label>
            <input type="text" id="cliente">
        </div>

        <div class="form-group">
            <label>Código producto</label>
            <input type="text" id="codigo">
        </div>

        <div class="form-group">
            <label>Nombre producto</label>
            <input type="text" id="nombre">
        </div>

        <div class="form-group">
            <label>Cantidad</label>
            <input type="number" id="cantidad">
        </div>

        <div class="form-group">
            <label>Precio unitario</label>
            <input type="number" id="precioUnitario">
        </div>

        <div class="form-group">
            <label>Descuento</label>
            <input type="number" id="descuento" value="0">
        </div>

        <div class="form-group">
            <label>Impuesto</label>
            <input type="number" id="impuesto" value="0">
        </div>

        <div class="form-group">
            <label>Método de pago</label>
            <select id="metodoPago">
                <option>Efectivo</option>
                <option>Tarjeta</option>
                <option>Transferencia</option>
            </select>
        </div>

        <div class="form-group">
            <label>Usuario responsable</label>
            <input type="text" id="usuario">
        </div>

        <div class="form-group">
            <label>Estado</label>
            <select id="estado">
                <option>Emitida</option>
                <option>Pagada</option>
                <option>Anulada</option>
            </select>
        </div>

        <div class="buttons">
            <button onclick="guardarFactura()">Guardar</button>
            <button onclick="actualizarFactura()">Actualizar</button>
            <button onclick="limpiarFormulario()">Limpiar</button>
        </div>

    </div>

    <div class="table-card">
        <table>
            <thead>
                <tr>
                    <th>Factura</th>
                    <th>Venta</th>
                    <th>Cliente</th>
                    <th>Producto</th>
                    <th>Total</th>
                    <th>Método</th>
                    <th>Usuario</th>
                    <th>Fecha</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="tablaFacturas"></tbody>
        </table>
    </div>

</div>

<script src="../../services/auditoria.js"></script>
<script src="facturas.js"></script>

</body>
</html>
